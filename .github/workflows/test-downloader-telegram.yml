name: test-downloader-telegram

on:
  workflow_dispatch:
    inputs:
      telegram_links:
        description: >
          لینک(های) تلگرام. جدا با کاما، فاصله یا خط جدید.
          فرمت‌های معتبر:
            t.me/channel/123
            t.me/c/1234567890/123
            t.me/username/s/42   (استوری)
        required: true
      job_id:
        description: 'Job ID (set automatically by bot)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      # ── ۱. نصب ابزارها ──────────────────────────────────────────
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq zip python3-pip
          pip3 install --quiet telethon

      # ── ۲. دانلود با Telethon ────────────────────────────────────
      - name: Download via Telegram userbot
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION_STRING: ${{ secrets.TG_SESSION_STRING }}
          TG_LINKS: ${{ github.event.inputs.telegram_links }}
        run: |
          mkdir -p /tmp/downloads
          python3 << 'PYEOF'
          import os
          import re
          import sys
          from telethon.sync import TelegramClient
          from telethon.sessions import StringSession
          from telethon.tl.functions.stories import GetStoriesByIDRequest

          api_id     = int(os.environ["TG_API_ID"])
          api_hash   = os.environ["TG_API_HASH"]
          session    = os.environ["TG_SESSION_STRING"]
          raw_links  = os.environ["TG_LINKS"]
          out_dir    = "/tmp/downloads"

          links = re.split(r'[,\s]+', raw_links.strip())
          links = [l for l in links if l]

          if not links:
              print("::error::No links provided")
              sys.exit(1)

          def parse_link(link: str):
              """
              برمی‌گرداند:
                ("story",   username, story_id)
                ("private", chat_id,  message_id)
                ("public",  username, message_id)
                (None, None, None)
              """
              m = re.search(r'(?:t\.me|telegram\.me)/([^/]+)/s/(\d+)', link)
              if m:
                  return "story", m.group(1), int(m.group(2))

              m = re.search(r'(?:t\.me|telegram\.me)/c/(\d+)/(\d+)', link)
              if m:
                  internal_id = int(m.group(1))
                  msg_id = int(m.group(2))
                  chat_id = int(f"-100{internal_id}")
                  return "private", chat_id, msg_id

              m = re.search(r'(?:t\.me|telegram\.me)/([^/]+)/(\d+)', link)
              if m:
                  return "public", m.group(1), int(m.group(2))

              return None, None, None

          success_count = 0

          with TelegramClient(StringSession(session), api_id, api_hash) as client:
              me = client.get_me()
              print(f"✅ Logged in as: {me.first_name}")

              for link in links:
                  print(f"────────────────────────────────")
                  print(f"Processing: {link}")

                  kind, ident, item_id = parse_link(link)
                  if kind is None:
                      print(f"⚠️ Could not parse link: {link}")
                      continue

                  try:
                      if kind == "story":
                          result = client(GetStoriesByIDRequest(peer=ident, id=[item_id]))
                          if not result.stories:
                              print(f"⚠️ استوری پیدا نشد — یا منقضی شده یا حریم‌خصوصی محدودش کرده")
                              print(f"   (فقط مخاطبین یا استوری‌های عمومی قابل‌دسترسی هستند)")
                              continue
                          story = result.stories[0]
                          if not story.media:
                              print(f"⚠️ این استوری رسانه ندارد (شاید فقط متن است)")
                              continue

                          print(f"⬇️ Downloading story...")
                          path = None

                          # روش ۱: خود media مستقیم
                          try:
                              path = client.download_media(story.media, file=out_dir + "/")
                          except Exception as e1:
                              print(f"   [روش ۱ ناموفق: {e1}]")

                          # روش ۲: زیرمجموعه‌ی photo/document در media
                          if not path:
                              try:
                                  sub_media = getattr(story.media, "photo", None) or \
                                              getattr(story.media, "document", None)
                                  if sub_media:
                                      path = client.download_media(sub_media, file=out_dir + "/")
                              except Exception as e2:
                                  print(f"   [روش ۲ ناموفق: {e2}]")

                          # روش ۳: کل شیء story
                          if not path:
                              try:
                                  path = client.download_media(story, file=out_dir + "/")
                              except Exception as e3:
                                  print(f"   [روش ۳ ناموفق: {e3}]")

                          if not path:
                              print(f"❌ هر ۳ روش دانلود استوری ناموفق بود")

                      else:
                          chat_id = ident
                          message = client.get_messages(chat_id, ids=item_id)
                          if not message or not message.media:
                              print(f"⚠️ No media found in message: {link}")
                              continue
                          print(f"⬇️ Downloading...")
                          path = client.download_media(message, file=out_dir + "/")

                      if path:
                          print(f"✅ Downloaded: {path}")
                          success_count += 1
                      else:
                          print(f"⚠️ Download returned no file for: {link}")

                  except Exception as e:
                      print(f"❌ Error processing {link}: {e}")

          print(f"────────────────────────────────")
          print(f"Total successful downloads: {success_count}")

          if success_count == 0:
              print("::error::No files were downloaded")
              sys.exit(1)
          PYEOF

          echo "Downloaded files:"
          ls -lh /tmp/downloads/

      # ── ۳. فشرده‌سازی ───────────────────────────────────────────
      - name: Zip and split files
        run: |
          mkdir -p /tmp/upload
          RAND=$(openssl rand -hex 3)
          ZIP_NAME="telegram_${RAND}.zip"
          (cd /tmp/downloads && zip -0 -s 95m "/tmp/upload/$ZIP_NAME" *)

          echo "Archive:"
          ls -lh /tmp/upload/

          if [ -z "$(ls -A /tmp/upload 2>/dev/null)" ]; then
            echo "::error::Archive empty"
            exit 1
          fi
          echo "✅ Archive ready"

      # ── ۴. چک‌اوت Repo2 ─────────────────────────────────────────
      - name: Checkout Repo2
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/my-files
          token: ${{ secrets.SECOND_REPO_TOKEN }}
          path: repo2

      # ── ۵. Force push ─────────────────────────────────────────────
      - name: Force push to Repo2 with job_meta
        run: |
          JOB_ID="${{ github.event.inputs.job_id }}"
          cd repo2
          git checkout --orphan temp_branch 2>/dev/null || true
          git rm -rf . 2>/dev/null || true
          cp /tmp/upload/* ./
          if [ -n "$JOB_ID" ]; then
            echo "{\"job_id\":\"$JOB_ID\",\"status\":\"ready\"}" > job_meta.json
          fi
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "telegram:${JOB_ID:-manual}"
          git branch -M main
          git push --force origin main
          echo "✅ Done"
